<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Misconfiguration Scanner</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" integrity="sha384-..." crossorigin="anonymous" />
</head>
<body>
    <div class="container py-5">
        <h1 class="mb-4">Cloud Misconfiguration Scanner</h1>
        <p class="lead">Enter a domain to scan for exposed S3 buckets and Azure blob containers.</p>

        {% if error_message %}
            <div class="alert alert-danger" role="alert">{{ error_message }}</div>
        {% endif %}

        <form method="post" action="/scan">
            <div class="mb-3">
                <label for="domain" class="form-label">Domain or hostname</label>
                <input type="text" class="form-control" id="domain" name="domain" placeholder="example.com" required />
            </div>

            <div class="mb-3">
                <label class="form-label">Report format</label>
                <select class="form-select" name="format">
                    <option value="html" selected>HTML</option>
                    <option value="pdf">PDF</option>
                    <option value="both">Both</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Start scan</button>
        </form>

        <hr />
        <p class="text-muted">The scan runs on the server and saves generated reports in the <code>output/</code> folder.</p>
    </div>
</body>
</html>
